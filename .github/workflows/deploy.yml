name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main  # Of 'master', afhankelijk van de default branch
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Altijd handig als de repo externe thema's gebruikt

      # Optie A: Als de nl-data-optout repo Hugo gebruikt (net als Zephyrus-Linux)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site (met upstream URL)
        # CRUCIAAL: Hier forceren we de output naar de URL van de maintainer
        run: hugo --minify --baseURL "https://apolloccrypt.github.io/nl-data-optout/"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    # Deploy alleen als het gemerged is naar main (voorkomt deploys van losse PR's op actieve sites)
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
