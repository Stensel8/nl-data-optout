about_title: "Over dit project"
about_intro: "Dit project brengt in kaart hoe Nederlandse bedrijven en internationale partijen die in Nederland actief zijn omgaan met persoonsgegevens."
about_scope_title: "Reikwijdte"
about_scope: "De tool richt zich op de Nederlandse markt en de AVG zoals gehandhaafd door de Autoriteit Persoonsgegevens. De lijst bevat ook buitenlandse bedrijven (zoals Google, Meta en Amazon) die gegevens verwerken van mensen in Nederland. Als je in Nederland woont, val je onder de Nederlandse AP, ongeacht waar het bedrijf gevestigd is. Je kunt dus ook naar buitenlandse partijen een geldig GDPR-verzoek sturen."
about_goals_title: "Doelen"
about_goal1: "Transparantie bieden over cookie-tracking, dark patterns en onnodige dataopslag"
about_goal2: "Bewijs leveren voor wetgevingsinitiatieven voor betere gegevensbescherming, waaronder Check Don't Store (2026Z04148)"
about_goal3: "Burgers praktische tools geven om hun AVG-rechten uit te oefenen"
about_footer: "Het project is gratis, onafhankelijk en gebaseerd op openbaar reproduceerbaar onderzoek."
