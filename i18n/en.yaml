about_title: "About this project"
about_intro: "This project maps how Dutch companies and international parties active in the Netherlands handle personal data."
about_scope_title: "Scope"
about_scope: "The tool focuses on the Dutch market and the GDPR as enforced by the Dutch Data Protection Authority (AP). The list also includes foreign companies (such as Google, Meta and Amazon) that process data of people in the Netherlands. If you live in the Netherlands, you fall under the Dutch AP, regardless of where the company is based. This means you can send a valid GDPR request to foreign parties as well."
about_goals_title: "Goals"
about_goal1: "Provide transparency about cookie tracking, dark patterns and unnecessary data storage"
about_goal2: "Support legislative efforts for stronger data protection, including Check Don't Store (2026Z04148)"
about_goal3: "Give citizens practical tools to exercise their GDPR rights"
about_footer: "The project is free, independent and based on publicly reproducible research."
